included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm

# Curated opt-in set: correctness and safety rules that are off by default.
# Deliberately excludes opt-in rules that fight swift-format's own style
# (e.g. contrasted_opening_brace wants Allman braces; swift-format enforces
# K&R; pattern_matching_keywords wants `case let .foo(a, b)` where
# swift-format's UseLetInEveryBoundCaseVariable wants `case .foo(let a, let b)`)
# or that are purely stylistic bikeshedding (explicit_type_interface,
# explicit_acl). Two formatters disagreeing on brace/type/binding style is
# worse than one strict tool being slightly less exhaustive.
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - convenience_type
  - discouraged_optional_boolean
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - private_action
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  # Conflicts with swift-format's own trailing-comma handling.
  - trailing_comma
  # Redundant with our documented use of `// TODO:` during active phases;
  # revisit before a 1.0 tag.
  - todo
  # We rely on swift-format for line length; avoid two tools disagreeing on the limit.
  - line_length

analyzer_rules:
  - unused_import
  - unused_declaration

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y

type_name:
  min_length:
    warning: 3

large_tuple:
  warning: 3

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 250
  error: 400

file_length:
  warning: 400
  error: 600

cyclomatic_complexity:
  warning: 12
  error: 20

reporter: "xcode"
