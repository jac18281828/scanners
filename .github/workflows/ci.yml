name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    # Belt-and-suspenders after a real incident: Phase 4's first CI push hung on the Test
    # step for 20+ minutes with zero output and needed a manual cancellation (suspected
    # CoreML/Vision falling back to CPU-only inference with no Neural Engine passthrough on
    # this VM — see OCREngine.recognizeLines' doc comment; tests now request `.fast` to
    # avoid it). If something regresses that bound, fail loud and bounded instead of hanging
    # until a human notices and cancels it by hand.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Ensure arm64 runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: $arch"
          test "$arch" = "arm64"

      - name: Install pkg-config
        run: command -v pkg-config >/dev/null 2>&1 || brew install pkgconf

      # ScannerKit's CSane target links Vendor/lib and its module map reaches into
      # Vendor/include (see Package.swift) — every `swift build`/`swift test` needs the
      # vendored SANE stack present first, hardware or not. Same tarball cache as the
      # sane-vendor job below; separate runner/VM, so it's rebuilt here too.
      - name: Cache vendored source tarballs
        uses: actions/cache@v4
        with:
          path: Vendor/.cache
          key: sane-vendor-tarballs-${{ hashFiles('Scripts/build-sane.sh') }}

      - name: Build vendored SANE stack
        run: ./Scripts/build-sane.sh

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --strict

      - name: Install swift-format
        run: brew install swift-format

      - name: swift-format lint
        run: swift-format lint --strict --configuration .swift-format --recursive Sources Tests Package.swift

  sane-vendor:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure arm64 runner
        run: |
          arch="$(uname -m)"
          echo "runner arch: $arch"
          test "$arch" = "arm64"

      - name: Install pkg-config
        run: command -v pkg-config >/dev/null 2>&1 || brew install pkgconf

      # Caches the downloaded, hash-verified source tarballs only (Vendor/.cache).
      # build-sane.sh itself always runs — this is the fragile part of the
      # pipeline (the --enable-preload patch), so every CI run re-verifies it
      # actually builds; the cache just avoids re-fetching ~8MB from GitHub/
      # GitLab on every run. Keyed on the build script's own hash, which
      # embeds the pinned sane-backends/libusb versions and their SHA-256s —
      # any version bump or hash change invalidates the cache automatically.
      - name: Cache vendored source tarballs
        uses: actions/cache@v4
        with:
          path: Vendor/.cache
          key: sane-vendor-tarballs-${{ hashFiles('Scripts/build-sane.sh') }}

      - name: Build vendored SANE stack
        run: ./Scripts/build-sane.sh

      - name: Smoke test (no hardware in CI — device assertion skipped)
        env:
          SANE_PROBE_SKIP_DEVICE_CHECK: "1"
        run: ./Scripts/smoke-sane.sh
